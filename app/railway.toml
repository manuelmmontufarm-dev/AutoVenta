# Config de deploy en Railway. El Root Directory del servicio debe ser `app/`.
# Sin buildCommand custom: Nixpacks ya corre npm ci + npm run build con sus
# cache mounts (un buildCommand con `npm ci` choca con el cache → EBUSY).
[build]
builder = "nixpacks"

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
